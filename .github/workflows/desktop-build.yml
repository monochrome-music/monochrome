name: Native Build Prep

on:
  push:
    branches: [main, capacitor]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web bundle
        run: npm run build

      - name: Copy web assets into Capacitor
        run: npm run cap:copy

      - name: Prepare release archive
        run: |
          mkdir -p release
          cp -r dist release/dist
          cp capacitor.config.json release/
          cd release
          zip -r ../monochrome-capacitor-web.zip .
        shell: bash

      - name: Isolate Zip File
        run: |
          mkdir out_delivery
          mv monochrome-capacitor-web.zip out_delivery/
        shell: bash

      - name: Upload to R2
        uses: ryand56/r2-upload-action@latest
        with:
          r2-account-id: ${{ secrets.R2_ACCOUNT_ID }}
          r2-access-key-id: ${{ secrets.R2_ACCESS_KEY_ID }}
          r2-secret-access-key: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          r2-bucket: ${{ secrets.R2_BUCKET }}
          source-dir: 'out_delivery'
          destination-dir: ''

      - name: Upload Artifact (GH Internal)
        uses: actions/upload-artifact@v4
        with:
          name: Monochrome-capacitor
          path: release/
          retention-days: 30
