name: Undo / Redo Deployment

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Choose action'
        required: true
        type: choice
        options:
          - undo
          - redo

jobs:
  undo-redo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Undo - Revert last commit
        if: ${{ github.event.inputs.action == 'undo' }}
        run: |
          LAST_COMMIT=$(git log -1 --format="%H")
          echo "Reverting commit: $LAST_COMMIT"
          echo "Commit message: $(git log -1 --format="%s")"

          # Check if it's a merge commit
          PARENT_COUNT=$(git cat-file -p $LAST_COMMIT | grep -c '^parent')
          if [ "$PARENT_COUNT" -gt 1 ]; then
            echo "Merge commit detected, using -m 1"
            git revert --no-edit -m 1 $LAST_COMMIT
          else
            git revert --no-edit $LAST_COMMIT
          fi

          git push origin main
          echo "Undo complete! Vercel will auto-deploy the reverted version."

      - name: Redo - Revert the last revert
        if: ${{ github.event.inputs.action == 'redo' }}
        run: |
          # Find the last revert commit
          LAST_MSG=$(git log -1 --format="%s")
          if [[ "$LAST_MSG" == Revert* ]]; then
            LAST_COMMIT=$(git log -1 --format="%H")
            echo "Reverting the revert: $LAST_COMMIT"

            PARENT_COUNT=$(git cat-file -p $LAST_COMMIT | grep -c '^parent')
            if [ "$PARENT_COUNT" -gt 1 ]; then
              git revert --no-edit -m 1 $LAST_COMMIT
            else
              git revert --no-edit $LAST_COMMIT
            fi

            git push origin main
            echo "Redo complete! Vercel will auto-deploy the restored version."
          else
            echo "ERROR: Last commit is not a revert commit."
            echo "Last commit message: $LAST_MSG"
            echo "Redo can only be used after an Undo."
            exit 1
          fi
