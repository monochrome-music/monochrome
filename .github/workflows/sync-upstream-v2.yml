name: Sinkronisasi Upstream (Penggabungan Cerdas)

on:
  schedule:
          # Cek setiap 5 menit
         - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Paksa sinkronisasi meskipun sudah terbaru'
        required: false
        default: 'false'
        type: boolean
      strategy:
        description: 'Strategi penggabungan: aman (milik kita saat konflik) atau terima (milik mereka)'
        required: false
        default: 'safe'
        type: choice
        options:
          - safe
          - accept
      auto_sync:
        description: 'Aktifkan/nonaktifkan jadwal sinkronisasi otomatis'
        required: false
        default: 'no_change'
        type: choice
        options:
          - no_change
          - enable
          - disable

env:
  UPSTREAM_REPO: monochrome-music/monochrome
  UPSTREAM_BRANCH: main
  FORK_BRANCH: main
  PROTECTED_PATHS: |
    .github/workflows/
    .github/FUNDING.yml
    .github/agents/
                index.html
            styles.css
            images/monochrome-logo.svg
            public/manifest.json
                  js/storage.js

jobs:
  toggle:
    name: Atur Sinkronisasi Otomatis
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.auto_sync != 'no_change'
    steps:
      - name: Perbarui variabel AUTO_SYNC
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.auto_sync }}" = "enable" ]; then
            VALUE="true"
          else
            VALUE="false"
          fi
          echo "Mengatur AUTO_SYNC ke: $VALUE"
          gh variable set AUTO_SYNC --body "$VALUE" --repo "${{ github.repository }}"
          echo "Sinkronisasi otomatis sekarang: ${{ github.event.inputs.auto_sync }}d"
          echo "## Sinkronisasi Otomatis Diubah" >> $GITHUB_STEP_SUMMARY
          echo "AUTO_SYNC diatur ke **$VALUE**" >> $GITHUB_STEP_SUMMARY

  sync:
    name: Sinkronisasi Cerdas dari Upstream
    runs-on: ubuntu-latest
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    needs: [toggle]
    permissions:
      contents: write
      actions: write
    steps:
      - name: Cek apakah sinkronisasi otomatis aktif
        id: auto
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            AUTO="${{ vars.AUTO_SYNC }}"
            if [ "$AUTO" = "false" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "::notice::Sinkronisasi otomatis NONAKTIF. Melewati jadwal berjalan."
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout fork (riwayat lengkap)
        if: steps.auto.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ env.FORK_BRANCH }}

      - name: Konfigurasi identitas Git
        if: steps.auto.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Ambil data upstream
        if: steps.auto.outputs.skip != 'true'
        run: |
          git remote add upstream "https://github.com/${{ env.UPSTREAM_REPO }}.git"
          git fetch upstream ${{ env.UPSTREAM_BRANCH }} --no-tags
          echo "Upstream berhasil diambil."

      - name: Cek status sinkronisasi
        if: steps.auto.outputs.skip != 'true'
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/${{ env.UPSTREAM_BRANCH }})
          AHEAD=$(git rev-list --count upstream/${{ env.UPSTREAM_BRANCH }}..HEAD)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "=== Status Fork ==="
          echo "Commit tertinggal dari upstream: $BEHIND"
          echo "Commit di depan upstream: $AHEAD"
          if [ "$BEHIND" -eq 0 ] && [ "${{ github.event.inputs.force_sync }}" != "true" ]; then
            echo "needs_sync=false" >> $GITHUB_OUTPUT
            echo "Sudah terbaru!"
          else
            echo "needs_sync=true" >> $GITHUB_OUTPUT
            echo "Perlu sinkronisasi."
          fi

      - name: Cadangkan file yang dilindungi
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        run: |
          mkdir -p /tmp/protected-backup
          echo "$PROTECTED_PATHS" | while IFS= read -r path; do
            path=$(echo "$path" | xargs)
            [ -z "$path" ] && continue
            if [ -e "$path" ]; then
              mkdir -p "/tmp/protected-backup/$(dirname "$path")"
              cp -r "$path" "/tmp/protected-backup/$path"
              echo "Dicadangkan: $path"
            fi
          done
          echo "--- Isi cadangan ---"
          find /tmp/protected-backup -type f 2>/dev/null || echo "(kosong)"

      - name: Buat tag snapshot sebelum sinkronisasi
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        id: snapshot
        run: |
          TAG="pre-sync-$(date +'%Y%m%d-%H%M%S')"
          git tag "$TAG"
          echo "Tag keamanan dibuat: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Atur URL push dengan token
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        run: |
          git remote set-url origin "https://x-access-token:${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Gabungkan perubahan upstream
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        id: merge
        run: |
          set -e
          STRATEGY="${{ github.event.inputs.strategy || 'safe' }}"
          echo "Menggunakan strategi: $STRATEGY"
          if [ "$STRATEGY" = "accept" ]; then
            MERGE_OPT="-X theirs"
          else
            MERGE_OPT="-X ours"
          fi
          if git merge upstream/${{ env.UPSTREAM_BRANCH }} \
            --no-edit \
            --allow-unrelated-histories \
            $MERGE_OPT \
            -m "sinkronisasi: gabung upstream $(date +'%Y-%m-%d %H:%M') [otomatis]"; then
            echo "merge_status=bersih" >> $GITHUB_OUTPUT
            echo "Penggabungan selesai tanpa konflik."
          else
            echo "Penggabungan ada konflik, menyelesaikan..."
            CONFLICTS=$(git diff --name-only --diff-filter=U || true)
            if [ -n "$CONFLICTS" ]; then
              echo "File berkonflik:"
              echo "$CONFLICTS"
              echo "$CONFLICTS" | while IFS= read -r f; do
                [ -z "$f" ] && continue
                if [ "$STRATEGY" = "accept" ]; then
                  git checkout --theirs "$f" 2>/dev/null || true
                else
                  git checkout --ours "$f" 2>/dev/null || true
                fi
                git add "$f"
              done
              git commit --no-edit -m "sinkronisasi: gabung upstream (konflik diselesaikan dengan strategi $STRATEGY) $(date +'%Y-%m-%d %H:%M')"
              echo "merge_status=diselesaikan" >> $GITHUB_OUTPUT
            else
              echo "merge_status=gagal" >> $GITHUB_OUTPUT
              echo "::error::Penggabungan gagal tanpa konflik yang bisa diidentifikasi"
              exit 1
            fi
          fi

      - name: Pulihkan file yang dilindungi
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        run: |
          echo "$PROTECTED_PATHS" | while IFS= read -r path; do
            path=$(echo "$path" | xargs)
            [ -z "$path" ] && continue
            if [ -e "/tmp/protected-backup/$path" ]; then
              cp -r "/tmp/protected-backup/$path" "$path"
              echo "Dipulihkan: $path"
            fi
          done
          if ! git diff --quiet; then
            git add -A
            git commit -m "sinkronisasi: pulihkan file yang dilindungi setelah sinkronisasi upstream"
            echo "File yang dilindungi dipulihkan."
          else
            echo "Tidak ada file yang dilindungi berubah."
          fi

      - name: Validasi setelah penggabungan
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        run: |
          echo "=== Validasi pasca-penggabungan ==="
          for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*' | head -20); do
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "::warning::JSON tidak valid: $f"
            fi
          done
          if [ -f package.json ]; then
            if python3 -c "import json; json.load(open('package.json'))" 2>/dev/null; then
              echo "package.json: OK"
            else
              echo "::error::package.json tidak valid!"
              exit 1
            fi
          fi
          echo "Validasi berhasil."

      - name: Push perubahan
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        run: |
          if git push origin ${{ env.FORK_BRANCH }}; then
            echo "========================================"
            echo " SINKRONISASI SELESAI"
            echo "========================================"
            echo "Digabung: ${{ steps.check.outputs.behind }} commit dari upstream"
            echo "Strategi: ${{ github.event.inputs.strategy || 'safe' }}"
            echo "Penggabungan: ${{ steps.merge.outputs.merge_status }}"
            echo "${{ steps.check.outputs.ahead }} commit lokal kamu: TERJAGA"
            echo "Tag rollback: ${{ steps.snapshot.outputs.tag }}"
            echo "========================================"
          else
            echo "::error::Push gagal! Periksa izin PAT_TOKEN."
            exit 1
          fi

      - name: Ringkasan
        if: always()
        run: |
          echo "## Ringkasan Sinkronisasi Upstream" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Nilai |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Sinkronisasi otomatis | \`${{ vars.AUTO_SYNC || 'true (default)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Dilewati | ${{ steps.auto.outputs.skip || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tertinggal dari upstream | ${{ steps.check.outputs.behind || 'n/a' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Di depan upstream | ${{ steps.check.outputs.ahead || 'n/a' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Perlu sinkronisasi | ${{ steps.check.outputs.needs_sync || 'n/a' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Status penggabungan | ${{ steps.merge.outputs.merge_status || 'dilewati' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Strategi | ${{ github.event.inputs.strategy || 'safe' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag rollback | \`${{ steps.snapshot.outputs.tag || 'n/a' }}\` |" >> $GITHUB_STEP_SUMMARY
