name: Sync Upstream (Smart Merge)

on:
  schedule:
    # Cek setiap 6 jam
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      force_sync:
        description: 'Force sync even if up to date'
        required: false
        default: 'false'
        type: boolean
      strategy:
        description: 'Merge strategy: safe (ours on conflict) or accept (theirs)'
        required: false
        default: 'safe'
        type: choice
        options:
          - safe
          - accept
      auto_sync:
        description: 'Enable/disable auto sync schedule'
        required: false
        default: 'no_change'
        type: choice
        options:
          - no_change
          - enable
          - disable

env:
  UPSTREAM_REPO: monochrome-music/monochrome
  UPSTREAM_BRANCH: main
  FORK_BRANCH: main
  PROTECTED_PATHS: |
    .github/workflows/
    .github/FUNDING.yml
    .github/agents/

jobs:
  toggle:
    name: Toggle Auto Sync
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.auto_sync != 'no_change'
    steps:
      - name: Update AUTO_SYNC variable
        env:
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          if [ "${{ github.event.inputs.auto_sync }}" = "enable" ]; then
            VALUE="true"
          else
            VALUE="false"
          fi
          echo "Setting AUTO_SYNC to: $VALUE"
          gh variable set AUTO_SYNC --body "$VALUE" --repo "${{ github.repository }}"
          echo "Auto sync is now: ${{ github.event.inputs.auto_sync }}d"
          echo "## Auto Sync Toggled" >> $GITHUB_STEP_SUMMARY
          echo "AUTO_SYNC set to **$VALUE**" >> $GITHUB_STEP_SUMMARY

  sync:
    name: Smart Sync from Upstream
    runs-on: ubuntu-latest
    if: |
      always() &&
      (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    needs: [toggle]
    permissions:
      contents: write
      actions: write

    steps:
      - name: Check if auto sync is enabled
        id: auto
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            AUTO="${{ vars.AUTO_SYNC }}"
            if [ "$AUTO" = "false" ]; then
              echo "skip=true" >> $GITHUB_OUTPUT
              echo "::notice::Auto sync is DISABLED. Skipping scheduled run."
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout fork (full history)
        if: steps.auto.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ env.FORK_BRANCH }}

      - name: Configure Git identity
        if: steps.auto.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        if: steps.auto.outputs.skip != 'true'
        run: |
          git remote add upstream "https://github.com/${{ env.UPSTREAM_REPO }}.git"
          git fetch upstream ${{ env.UPSTREAM_BRANCH }} --no-tags
          echo "Upstream fetched successfully."

      - name: Check sync status
        if: steps.auto.outputs.skip != 'true'
        id: check
        run: |
          BEHIND=$(git rev-list --count HEAD..upstream/${{ env.UPSTREAM_BRANCH }})
          AHEAD=$(git rev-list --count upstream/${{ env.UPSTREAM_BRANCH }}..HEAD)
          echo "behind=$BEHIND" >> $GITHUB_OUTPUT
          echo "ahead=$AHEAD" >> $GITHUB_OUTPUT
          echo "=== Fork Status ==="
          echo "Commits behind upstream: $BEHIND"
          echo "Commits ahead of upstream: $AHEAD"

          if [ "$BEHIND" -eq 0 ] && [ "${{ github.event.inputs.force_sync }}" != "true" ]; then
            echo "needs_sync=false" >> $GITHUB_OUTPUT
            echo "Already up to date!"
          else
            echo "needs_sync=true" >> $GITHUB_OUTPUT
            echo "Sync needed."
          fi

      - name: Backup protected files
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        run: |
          mkdir -p /tmp/protected-backup
          echo "$PROTECTED_PATHS" | while IFS= read -r path; do
            path=$(echo "$path" | xargs)
            [ -z "$path" ] && continue
            if [ -e "$path" ]; then
              mkdir -p "/tmp/protected-backup/$(dirname "$path")"
              cp -r "$path" "/tmp/protected-backup/$path"
              echo "Backed up: $path"
            fi
          done
          echo "--- Backup contents ---"
          find /tmp/protected-backup -type f 2>/dev/null || echo "(empty)"

      - name: Create pre-sync snapshot tag
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        id: snapshot
        run: |
          TAG="pre-sync-$(date +'%Y%m%d-%H%M%S')"
          git tag "$TAG"
          echo "Created safety tag: $TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT

      - name: Set push URL with token
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        run: |
          git remote set-url origin "https://x-access-token:${{ secrets.PAT_TOKEN || secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git"

      - name: Merge upstream changes
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        id: merge
        run: |
          set -e
          STRATEGY="${{ github.event.inputs.strategy || 'safe' }}"
          echo "Using strategy: $STRATEGY"

          if [ "$STRATEGY" = "accept" ]; then
            MERGE_OPT="-X theirs"
          else
            MERGE_OPT="-X ours"
          fi

          if git merge upstream/${{ env.UPSTREAM_BRANCH }} \
            --no-edit \
            --allow-unrelated-histories \
            $MERGE_OPT \
            -m "chore: sync upstream $(date +'%Y-%m-%d %H:%M') [auto]"; then
            echo "merge_status=clean" >> $GITHUB_OUTPUT
            echo "Merge completed cleanly."
          else
            echo "Merge had conflicts, resolving..."
            CONFLICTS=$(git diff --name-only --diff-filter=U || true)
            if [ -n "$CONFLICTS" ]; then
              echo "Conflicted files:"
              echo "$CONFLICTS"
              echo "$CONFLICTS" | while IFS= read -r f; do
                [ -z "$f" ] && continue
                if [ "$STRATEGY" = "accept" ]; then
                  git checkout --theirs "$f" 2>/dev/null || true
                else
                  git checkout --ours "$f" 2>/dev/null || true
                fi
                git add "$f"
              done
              git commit --no-edit -m "chore: sync upstream (conflicts resolved with $STRATEGY strategy) $(date +'%Y-%m-%d %H:%M')"
              echo "merge_status=resolved" >> $GITHUB_OUTPUT
            else
              echo "merge_status=failed" >> $GITHUB_OUTPUT
              echo "::error::Merge failed with no identifiable conflicts"
              exit 1
            fi
          fi

      - name: Restore protected files
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        run: |
          echo "$PROTECTED_PATHS" | while IFS= read -r path; do
            path=$(echo "$path" | xargs)
            [ -z "$path" ] && continue
            if [ -e "/tmp/protected-backup/$path" ]; then
              cp -r "/tmp/protected-backup/$path" "$path"
              echo "Restored: $path"
            fi
          done

          if ! git diff --quiet; then
            git add -A
            git commit -m "chore: restore protected files after upstream sync"
            echo "Protected files restored."
          else
            echo "No protected files were changed."
          fi

      - name: Validate build
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        run: |
          echo "=== Post-merge validation ==="
          for f in $(find . -name '*.json' -not -path './node_modules/*' -not -path './.git/*' | head -20); do
            if ! python3 -c "import json; json.load(open('$f'))" 2>/dev/null; then
              echo "::warning::Invalid JSON: $f"
            fi
          done
          if [ -f package.json ]; then
            if python3 -c "import json; json.load(open('package.json'))" 2>/dev/null; then
              echo "package.json: OK"
            else
              echo "::error::package.json is invalid!"
              exit 1
            fi
          fi
          echo "Validation passed."

      - name: Push changes
        if: steps.auto.outputs.skip != 'true' && steps.check.outputs.needs_sync == 'true'
        run: |
          if git push origin ${{ env.FORK_BRANCH }}; then
            echo "========================================"
            echo "  SYNC COMPLETE"
            echo "========================================"
            echo "Merged: ${{ steps.check.outputs.behind }} commits from upstream"
            echo "Strategy: ${{ github.event.inputs.strategy || 'safe' }}"
            echo "Merge: ${{ steps.merge.outputs.merge_status }}"
            echo "Your ${{ steps.check.outputs.ahead }} local commits: PRESERVED"
            echo "Rollback tag: ${{ steps.snapshot.outputs.tag }}"
            echo "========================================"
          else
            echo "::error::Push failed! Check PAT_TOKEN permissions."
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Sync Upstream Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Auto sync | \`${{ vars.AUTO_SYNC || 'true (default)' }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Skipped | ${{ steps.auto.outputs.skip || 'false' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Behind upstream | ${{ steps.check.outputs.behind || 'n/a' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ahead of upstream | ${{ steps.check.outputs.ahead || 'n/a' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Sync needed | ${{ steps.check.outputs.needs_sync || 'n/a' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Merge status | ${{ steps.merge.outputs.merge_status || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Strategy | ${{ github.event.inputs.strategy || 'safe' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Rollback tag | \`${{ steps.snapshot.outputs.tag || 'n/a' }}\` |" >> $GITHUB_STEP_SUMMARY
