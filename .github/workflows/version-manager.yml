name: Version Manager (Backup, Restore & Delete)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: 'Pilih aksi yang ingin dijalankan'
        required: true
        type: choice
        options:
          - list-versions
          - restore-version
          - delete-version
      commit_sha:
        description: 'Commit SHA untuk restore/hapus'
        required: false
        type: string
      confirm:
        description: 'Ketik YES untuk konfirmasi aksi berbahaya'
        required: false
        default: 'NO'
        type: string

permissions:
  contents: write
  actions: write

jobs:
  auto-backup:
    name: Auto Backup saat Push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          SHA="${{ github.sha }}"
          TAG="backup/$(date -u +"%Y%m%d-%H%M%S")-${SHA:0:7}"
          git tag "$TAG" "$SHA" -m "Auto-backup"
          git push origin "$TAG"
          echo "BACKUP_TAG=$TAG" >> $GITHUB_ENV
      - run: |
          echo "## Auto Backup" >> $GITHUB_STEP_SUMMARY
          echo "Tag: ${{ env.BACKUP_TAG }}" >> $GITHUB_STEP_SUMMARY

  list-versions:
    name: Daftar Semua Versi Backup
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'list-versions'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - run: git fetch --tags --force
      - run: |
          echo "## Daftar Versi Backup" >> $GITHUB_STEP_SUMMARY
          echo "| # | Tag | SHA | Tanggal | Pesan |" >> $GITHUB_STEP_SUMMARY
          echo "|---|-----|-----|---------|-------|" >> $GITHUB_STEP_SUMMARY
          COUNT=0
          while IFS= read -r TAG; do
            COUNT=$((COUNT + 1))
            SHA=$(git rev-list -n 1 "$TAG" 2>/dev/null || echo "")
            DATE=$(git log -1 --format="%ai" "$SHA" 2>/dev/null || echo "")
            MSG=$(git log -1 --format="%s" "$SHA" 2>/dev/null || echo "")
            echo "| $COUNT | $TAG | ${SHA:0:7} | $DATE | ${MSG:0:60} |" >> $GITHUB_STEP_SUMMARY
          done < <(git tag --list "backup/*" --sort=-version:refname)
          echo "Total: $COUNT" >> $GITHUB_STEP_SUMMARY

  restore-version:
    name: Restore ke Versi Tertentu
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'restore-version'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Validasi
        run: |
          [ -n "${{ github.event.inputs.commit_sha }}" ] || { echo "SHA kosong"; exit 1; }
          [ "${{ github.event.inputs.confirm }}" = "YES" ] || { echo "Konfirmasi diperlukan"; exit 1; }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: git fetch --tags --force

      - name: Setup Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Verifikasi SHA
        run: |
          FULL=$(git rev-parse "${{ github.event.inputs.commit_sha }}" 2>/dev/null) || { echo "SHA tidak ditemukan"; exit 1; }
          echo "TARGET=$FULL" >> $GITHUB_ENV
          echo "SHA ditemukan: $FULL"

      - name: Safety Backup
        run: |
          CUR=$(git rev-parse HEAD)
          TAG="backup/$(date -u +"%Y%m%d-%H%M%S")-${CUR:0:7}"
          git tag "$TAG" HEAD -m "Safety backup sebelum restore"
          git push origin "$TAG"
          echo "SAFETY=$TAG" >> $GITHUB_ENV

      - name: Force Reset via gh api
        run: |
          gh api repos/${{ github.repository }}/git/refs/heads/main \
            --method PATCH \
            -f sha="${{ env.TARGET }}" \
            -F force=true
          echo "Restore berhasil ke: ${{ env.TARGET }}"

      - name: Summary
        run: |
          echo "## Restore Selesai" >> $GITHUB_STEP_SUMMARY
          echo "Target SHA: ${{ env.TARGET }}" >> $GITHUB_STEP_SUMMARY
          echo "Safety Backup: ${{ env.SAFETY }}" >> $GITHUB_STEP_SUMMARY

  delete-version:
    name: Hapus Tag Backup
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'delete-version'
    runs-on: ubuntu-latest
    steps:
      - name: Validasi
        run: |
          [ -n "${{ github.event.inputs.commit_sha }}" ] || { echo "SHA kosong"; exit 1; }
          [ "${{ github.event.inputs.confirm }}" = "YES" ] || { echo "Konfirmasi diperlukan"; exit 1; }

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: git fetch --tags --force

      - run: |
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

      - name: Hapus tag
        run: |
          FULL=$(git rev-parse "${{ github.event.inputs.commit_sha }}" 2>/dev/null) || { echo "SHA tidak ditemukan"; exit 1; }
          SHORT="${FULL:0:7}"
          FOUND=false
          while IFS= read -r TAG; do
            TSHA=$(git rev-list -n 1 "$TAG" 2>/dev/null)
            if [ "$TSHA" = "$FULL" ]; then
              git push origin --delete "$TAG" && echo "Hapus: $TAG"
              FOUND=true
            fi
          done < <(git tag --list "backup/*")
          [ "$FOUND" = true ] || echo "Tidak ada tag untuk SHA $SHORT"

      - name: Summary
        run: echo "## Hapus Tag Selesai" >> $GITHUB_STEP_SUMMARY
