name: Sync Upstream

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Add upstream remote
        run: |
          git remote add upstream https://github.com/monochrome-music/monochrome.git
          git fetch upstream main

      - name: Merge upstream and push
        run: |
          set -e
          echo "=== Current HEAD ==="
          git log -1 --oneline
          echo ""
          echo "=== Upstream HEAD ==="
          git log -1 --oneline upstream/main
          echo ""

          # Check if there are new commits to merge
          BEHIND=$(git rev-list --count HEAD..upstream/main)
          echo "Commits behind upstream: $BEHIND"

          if [ "$BEHIND" -eq 0 ]; then
            echo "Already up to date with upstream!"
            exit 0
          fi

          # Set remote URL with token for push
          git remote set-url origin https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git

          # Try merge with recursive strategy, prefer ours on conflict
          if git merge upstream/main --no-edit -X ours --allow-unrelated-histories; then
            echo "Merge successful!"
          else
            echo "Standard merge failed, trying manual conflict resolution..."
            CONFLICTS=$(git diff --name-only --diff-filter=U)
            if [ -n "$CONFLICTS" ]; then
              echo "Resolving conflicts by keeping our version:"
              echo "$CONFLICTS"
              echo "$CONFLICTS" | while read file; do
                git checkout --ours "$file" 2>/dev/null || true
                git add "$file" 2>/dev/null || true
              done
              git commit --no-edit || true
            else
              echo "No file conflicts, aborting and retrying..."
              git merge --abort 2>/dev/null || true
              git merge upstream/main --no-edit -X theirs --allow-unrelated-histories || {
                echo "All merge strategies failed"
                exit 1
              }
            fi
          fi

          echo "Pushing to origin main..."
          git push origin main
          echo ""
          echo "Sync complete! All upstream commits merged."
          echo "Your commits are preserved. Vercel will auto-deploy."
